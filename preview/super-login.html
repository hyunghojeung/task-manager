<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>최고관리자 로그인</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Malgun Gothic', sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.login-box { background: #1e293b; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); width: 380px; text-align: center; border: 1px solid #334155; }
.login-box h1 { font-size: 20px; color: #f1f5f9; margin-bottom: 6px; }
.login-box .sub { font-size: 12px; color: #64748b; margin-bottom: 30px; }
.login-box label { display: block; text-align: left; font-size: 12px; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
.login-box input { width: 100%; padding: 10px 12px; border: 1px solid #475569; border-radius: 4px; font-size: 14px; margin-bottom: 16px; background: #0f172a; color: #f1f5f9; }
.login-box input:focus { outline: none; border-color: #3b82f6; }
.login-box button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: 600; }
.login-box button:hover { background: #2563eb; }
.login-box .back { margin-top: 16px; }
.login-box .back a { color: #64748b; font-size: 12px; text-decoration: none; }
.login-box .back a:hover { color: #94a3b8; }
</style>
</head>
<body>
<div class="login-box">
  <h1>Platform Admin</h1>
  <p class="sub">Blackcopy.kr 최고관리자</p>
  <label>관리자 ID</label>
  <input type="text" placeholder="아이디 입력" value="blackcopy2">
  <label>비밀번호</label>
  <input type="password" placeholder="비밀번호 입력" value="********">
  <button onclick="location.href='super-admin.html'">로그인</button>
  <div class="back">
    <a href="index.html">업체 사용자 로그인으로 이동</a>
  </div>
</div>
</body>
</html>
